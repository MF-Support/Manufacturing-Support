name: Preflight

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python
        run: python -m py_compile omnify_search_app.py

      - name: Check for blocked local artifacts
        shell: bash
        run: |
          blocked='(^|/)(.*cookies?.*|omnify_(after_login|login|login_probe|item|project|projects|vendor|e3|multiflex).*\.html|scrape_.*\.py|.*probe\.py|__pycache__)(/|$)|\.sqlite($|-)'
          if git ls-files | grep -Ei "$blocked"; then
            echo "Blocked local artifact detected in tracked files."
            exit 1
          fi

      - name: Check for obvious private markers
        shell: bash
        run: |
          markers='DFowler|usstlctpeaidb04|C:\\Users\\MFsupport\.COPELAND|SUPABASE_SERVICE_ROLE_KEY[[:space:]]*=[[:space:]]*["'\'']?eyJ|BEGIN .*PRIVATE KEY'
          if git grep -InE "$markers" -- . ':!.env.example' ':!DEPLOYMENT_MANIFEST.md' ':!.github/workflows/preflight.yml'; then
            echo "Private marker detected in tracked files."
            exit 1
          fi
