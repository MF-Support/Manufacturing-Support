<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manufacturing Support Database</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <div class="login-panel">
        <div class="brand-mark login-mark">C</div>
        <h1>Manufacturing Support Database</h1>
        <p>Sign in to search parts, schematics, BOM records, vendors, Where Used, documents, and ECO history.</p>
        <form id="authForm" class="login-form">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" autocomplete="username" placeholder="name@company.com" required autofocus />
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" required />
          <button id="loginBtn" type="submit">Sign in</button>
        </form>
        <p id="loginMessage" class="login-message">Use your approved Supabase account.</p>
      </div>
    </section>
    <script src="./app.js"></script>
  </body>
</html>
